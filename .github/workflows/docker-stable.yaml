---
name: Release Docker Build

"on":
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/docker-build-push.yaml
    with:
      source_ref: ${{ github.ref_name }}
      version: ${{ github.ref_name }}
      tags: ghcr.io/${{ github.repository_owner }}/opendkim-manage-go:${{ github.ref_name }}
