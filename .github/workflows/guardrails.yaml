name: Guardrails

on:
  push:
    branches:
      - main
      - features
      - release/**
  pull_request:
    branches:
      - main
      - features
      - release/**

permissions:
  contents: read
  pull-requests: read

env:
  GOEXPERIMENT: runtimesecret
  GOLANGCI_LINT_VERSION: v2.12.1

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: 1.26.5

      - name: Install golangci-lint
        run: |
          GOBIN="$(go env GOPATH)/bin" \
            go install "github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Enable vendored dependencies
        run: go env -w GOFLAGS=-mod=vendor

      - name: Set lint comparison base
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "${GITHUB_BASE_REF}"
          echo "GOLANGCI_NEW_FROM_REV=origin/${GITHUB_BASE_REF}" >> "$GITHUB_ENV"

      - name: Run guardrails
        run: make guardrails

      - name: Ensure guardrails did not mutate tracked files
        run: git diff --exit-code
