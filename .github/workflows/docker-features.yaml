---
name: Development Docker Build

"on":
  push:
    branches:
      - features

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/docker-build-push.yaml
    with:
      source_ref: ${{ github.sha }}
      version: dev
      tags: |
        ghcr.io/${{ github.repository_owner }}/opendkim-manage-go:dev
        ghcr.io/${{ github.repository_owner }}/opendkim-manage-go:features
