global:
  # Number of days that old keys stay protected before revoke/delete handling
  delete_delay: 10

  # Number of days after which new keys are generated by --add-new
  expire_after: 365

  # Selector format variables: ${randomhex:N}, ${year}, ${month}, ${day}
  selectorformat: "s${randomhex:8}.${year}-${month}"

  # Add DKIMIdentity=@domain to newly created LDAP selector objects
  use_dkim_identity: true

  # dark|light
  terminal_background: dark

  # both|rsa|ed25519
  keytype: both

  # Maximum number of revoked keys retained
  # Used only when revoked_retention is 0.
  max_revoked: 6

  # Days to retain direct-record DKIM tombstones (p=) after revocation.
  # Set to 0 only to select the legacy count-based max_revoked mode.
  revoked_retention: 30

  # CNAME mode selector prefixes
  cname_selector_rsa_prefix: "default-rsa-"
  cname_selector_ed25519_prefix: "default-ed25519-"

  # Domains that should use signing table wildcard domain '*'
  multiple_signatures_domains:
    - "example.org"

ldap:
  # LDAP URL format: ldap://host:port/base??scope?filter
  uri: "ldap://localhost:389/ou=dkim,o=company??sub?(&(objectClass=domain)(associatedDomain={0}))"

  # LDAP attribute carrying the DKIM domain
  domain: associatedDomain

  # Optional indicator attribute for CNAME-managed domains
  destination_indicator: destinationIndicator

  # Optional service type attribute used for DNS s= field
  service_type: description

  # Optional TLS and bind settings
  use_starttls: true
  reqcert: demand
  # Explicit legacy exception only; false requires LDAPS or StartTLS and
  # certificate verification.
  allow_insecure: false
  ca: "/etc/opendkim-manage/cacert.pem"

  bindmethod: simple
  binddn: "cn=admin,o=company"
  bindpw: "CHANGE_ME"

# Optional DNS section, required for --update-dns
dns:
  primary_nameserver: "127.0.0.1"

  # TSIG is mandatory for --update-dns; name and file are a required pair.
  tsig_key_file: "/etc/opendkim-manage/Kexample.+165+50659.private"
  tsig_key_name: "example"
  algorithm: "hmac_sha512"

  ttl: 3600

  # Mandatory allowlist for every LDAP destinationIndicator encountered.
  # Multiple zones can be separated by commas, semicolons, or whitespace.
  cnames: "cnames.example.com"
